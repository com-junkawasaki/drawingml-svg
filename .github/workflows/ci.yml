name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run lint
        run: ruff check .

      - name: Run unit tests
        run: pytest -q

      - name: Run analyzer fixtures
        run: |
          drawingml-svg analyze examples/sample.svg
          drawingml-svg analyze examples/complex.svg
          drawingml-svg analyze examples/coverage.svg
          python - <<'PY'
          from pathlib import Path

          from drawingml_svg import analyze_svg

          report = analyze_svg(Path("examples/coverage.svg").read_text(encoding="utf-8"))
          assert report.estimated_element_coverage == 1.0, report
          assert report.unsupported_elements == {}, report
          assert report.unsupported_attributes == {}, report
          assert report.unsupported_path_commands == {}, report
          PY

      - name: Build PPTX smoke fixture
        run: |
          python examples/make_pptx.py examples/coverage.svg -o tmp/ci-coverage.pptx
          python -m zipfile --test tmp/ci-coverage.pptx
